name: Self Hosted Runner Check

on:
  workflow_dispatch:

jobs:
  local-check:
    runs-on: self-hosted

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Show machine info
        run: |
          hostname
          whoami
          pwd

      - name: Check local DevOps tools
        run: |
          docker version
          minikube status
          kubectl config current-context
          kubectl get nodes
          helm version
          terraform version
